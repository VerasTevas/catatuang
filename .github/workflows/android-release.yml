name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'constants/**'
      - 'hooks/**'
      - 'storage/**'
      - 'types/**'
      - 'utils/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'tsconfig.json'
      - '.github/workflows/android-release.yml'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      CI: '1'
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode Android keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/catatuang-release.jks
          test -s /tmp/catatuang-release.jks

      - name: Generate native Android project
        run: npx expo prebuild -p android --clean

      - name: Configure Android release signing
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/catatuang-release.jks android/app/release.jks
          cat > android/keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          python3 .github/scripts/configure_android_signing.py

      - name: Build release APK
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: catatuang-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
